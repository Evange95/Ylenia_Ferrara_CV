name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build LaTeX PDFs ──────────────────────────────────────────────
      - name: Install TeX Live (XeLaTeX + fonts)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: texlive-xetex texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra fonts-roboto fonts-font-awesome
          version: 1.0

      - name: Build CVs
        working-directory: latex
        run: make -j2

      - name: Copy PDFs to website public/
        run: |
          cp latex/cv_en.pdf website/public/cv.pdf
          cp latex/cv_it.pdf website/public/cv_it.pdf

      # ── Build Astro site ──────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build website
        run: pnpm build

      # ── Deploy to Cloudflare Pages ────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy website/dist --project-name=ylenia-ferrara-cv --commit-dirty=true
