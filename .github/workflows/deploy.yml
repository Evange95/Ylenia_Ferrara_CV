name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build LaTeX PDFs ──────────────────────────────────────────────
      - name: Cache TeX Live
        id: cache-texlive
        uses: actions/cache@v4
        with:
          path: ~/texlive-snapshot.tar.zst
          key: texlive-${{ runner.os }}-v1

      - name: Restore TeX Live from cache
        if: steps.cache-texlive.outputs.cache-hit == 'true'
        run: sudo tar -I zstd -xf ~/texlive-snapshot.tar.zst -C /

      - name: Install TeX Live (XeLaTeX + fonts)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            fonts-roboto \
            fonts-font-awesome
          tar -I zstd -cf ~/texlive-snapshot.tar.zst \
            -C / \
            usr/bin/xelatex usr/bin/xdvipdfmx \
            usr/share/texlive usr/share/texmf \
            usr/share/fonts/truetype/roboto \
            usr/share/fonts/opentype/font-awesome

      - name: Build CVs
        working-directory: latex
        run: make -j2

      - name: Copy PDFs to website public/
        run: |
          cp latex/cv_en.pdf website/public/cv.pdf
          cp latex/cv_it.pdf website/public/cv_it.pdf

      # ── Build Astro site ──────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build website
        run: pnpm build

      # ── Deploy to Cloudflare Pages ────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy website/dist --project-name=ylenia-ferrara-cv --commit-dirty=true
